spring.application.name=wellness-tracker

# Database properties
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_tracker

spring.datasource.username=root

#If MySQL installation is password proctored,then use below property to set password
spring.datasource.password=root

#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8765

# ---------------------------------------------------------------------------
# JWT configuration
# jwt.secret reads from the JWT_SECRET environment variable if set,
# falling back to the dev value for local development.
# NEVER use the fallback value in production \u2014 set JWT_SECRET externally.
# Must be at least 32 characters for HS256.
#
# jwt.expiration.ms reads from JWT_EXPIRATION_MS if set.
# Default: 86400000 = 24 hours (suitable for dev/coursework).
# ---------------------------------------------------------------------------
jwt.secret=${JWT_SECRET:wellness-tracker-dev-secret-change-in-prod}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:c6a0e1a787c51e}
spring.mail.password=${MAIL_PASSWORD:f7ab7865d5f720}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

