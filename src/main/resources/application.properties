spring.application.name=wellness-tracker

# Database properties
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_tracker

spring.datasource.username=root

#If MySQL installation is password proctored,then use below property to set password
spring.datasource.password=root

#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8765

#API success messages
API.CREATE_ACTIVITY_SUCCESS=Activity logged successfully. Activity Log ID: 
API.WEEKLY_GOAL_SUCCESS=Weekly goal saved successfully. Weekly Goal ID: 
API.MOOD_LOG_SUCCESS=Mood logged successfully. Mood Log ID: 

#Service error messages
Service.USER_NOT_FOUND=User not found. Please provide a valid user ID.
Service.NO_ACTIVITY_FOUND=No activity logs found for the given user.
Service.WEEKLY_GOAL_NOT_FOUND=No weekly goal found for the given user and week.
Service.NO_MOOD_FOUND=No mood logs found for the given user and date range.
Service.INVALID_DATE_RANGE=From date cannot be after to date.
Service.INVALID_CREDENTIALS=Invalid email or password. Please try again.
Service.ACCOUNT_INACTIVE=Your account is inactive. Please contact HR.

#General error
General.EXCEPTION_MESSAGE=An unexpected error occurred. Please try again later.
