spring.application.name=wellness-tracker

# Database properties
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_tracker

spring.datasource.username=root

#If MySQL installation is password proctored,then use below property to set password
spring.datasource.password=root

#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8765

#API success messages
API.CREATE_ACTIVITY_SUCCESS=Activity logged successfully. Activity Log ID: 
API.DELETE_ACTIVITY_SUCCESS=Activity log deleted successfully.
API.WEEKLY_GOAL_SUCCESS=Weekly goal saved successfully. Weekly Goal ID: 
API.MOOD_LOG_SUCCESS=Mood logged successfully. Mood Log ID: 
API.CREATE_CHALLENGE_SUCCESS=Challenge created successfully. Challenge ID: 
API.JOIN_CHALLENGE_SUCCESS=Successfully joined the challenge. Participant ID: 
API.DELETE_CHALLENGE_SUCCESS=Challenge deleted successfully.
API.CREATE_ARTICLE_SUCCESS=Article saved successfully. Article ID: 
API.CREATE_BADGE_SUCCESS=Badge created successfully. Badge ID: 

